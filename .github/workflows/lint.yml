name: Run linters

on:
  push:
    branches:
      - 'master'
      - 'redmine-*'
  pull_request:

env:
  HUSKY: 0

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 26.x
        uses: actions/setup-node@v6
        with:
          node-version: 26.x

      - name: Install npm dependencies
        run: npm ci

      - name: Stylelint
        run: npm run lint:sass

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install npm dependencies
        run: npm ci

      - name: Check build
        run: npm run build
